name: CloudVault Test Automation CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  test:
    name: Run CloudVault Test Suite
    runs-on: ubuntu-latest  # Linux environment — mirrors our local WSL setup

    steps:
      # ── Step 1: Checkout the repository ──
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ── Step 2: Set up Python ──
      - name: Set Up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # ── Step 3: Cache pip dependencies ──
      # This speeds up CI runs by reusing installed packages
      - name: Cache pip Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Step 4: Install dependencies ──
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 5: Create required directories ──
      - name: Create Runtime Directories
        run: |
          mkdir -p logs reports

      # ── Step 6: Run upload tests ──
      - name: Run File Upload Tests
        run: |
          pytest tests/test_file_upload.py -v --tb=short

      # ── Step 7: Run sync tests ──
      - name: Run File Sync Tests
        run: |
          pytest tests/test_file_sync.py -v --tb=short

      # ── Step 8: Run integration tests ──
      - name: Run Integration Tests
        run: |
          pytest tests/test_integration.py -v --tb=short

      # ── Step 9: Run regression tests ──
      - name: Run Regression Tests
        run: |
          pytest tests/test_regression.py -v --tb=short

      # ── Step 10: Run full suite with HTML report ──
      - name: Run Full Test Suite and Generate Report
        run: |
          pytest tests/ -v --tb=short \
            --html=reports/test_report.html \
            --self-contained-html

      # ── Step 11: Upload test report as artifact ──
      # This makes the HTML report downloadable from GitHub Actions UI
      - name: Upload Test Report
        uses: actions/upload-artifact@v3
        if: always()  # Upload even if tests fail
        with:
          name: test-report
          path: reports/test_report.html

      # ── Step 12: Upload logs as artifact ──
      - name: Upload Test Logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-logs
          path: logs/

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Linting Tools
        run: |
          pip install flake8

      - name: Run Flake8 Linter
        run: |
          flake8 services/ utils/ tests/ \
            --max-line-length=100 \
            --exclude=venv,__pycache__ \
            --statistics \
            --count