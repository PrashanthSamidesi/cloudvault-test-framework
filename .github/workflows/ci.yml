name: CloudVault Test Automation CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run CloudVault Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Runtime Directories
        run: mkdir -p logs reports

      - name: Run Upload Tests
        run: pytest tests/test_file_upload.py -v --tb=short

      - name: Run Sync Tests
        run: pytest tests/test_file_sync.py -v --tb=short

      - name: Run Integration Tests
        run: pytest tests/test_integration.py -v --tb=short

      - name: Run Regression Tests
        run: pytest tests/test_regression.py -v --tb=short

      - name: Run Full Suite
        run: pytest tests/ -v --tb=short --html=reports/test_report.html --self-contained-html

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/test_report.html

      - name: Upload Test Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs
          path: logs/

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linting Tools
        run: pip install flake8

      - name: Run Flake8 Linter
        run: flake8 services/ utils/ tests/ --max-line-length=100 --extend-ignore=E501,W503